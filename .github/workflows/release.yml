name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Create or get release
        id: create_release
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: '${{ github.ref_name }}',
              });
              return data.id;
            } catch (_) {
              const { data } = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: '${{ github.ref_name }}',
                name: 'RAIL ${{ github.ref_name }}',
                body: [
                  'See `README.md` for installation instructions.',
                  '',
                  'Installers are built by `tauri-action` for Linux, macOS, and Windows.',
                  'On Linux, install your distro\'s RTL-SDR library if the app fails to start',
                  '(package name varies, e.g. `librtlsdr2` on recent Ubuntu).',
                  'Windows users must install the WinUSB driver via Zadig before first run',
                  '(see `docs/HARDWARE.md` §6).',
                ].join('\n'),
                draft: false,
                prerelease: false,
              });
              return data.id;
            }

  publish-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            target: ''
          - platform: 'macos-latest'
            target: ''
          - platform: 'windows-latest'
            target: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            librtlsdr-dev \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            libssl-dev libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            build-essential pkg-config

      - name: Install macOS dependencies
        if: matrix.platform == 'macos-latest'
        run: |
          brew install librtlsdr
          echo "LIBRTLSDR_LIB_DIR=$(brew --prefix librtlsdr)/lib" >> $GITHUB_ENV
          echo "LIBRARY_PATH=$(brew --prefix)/lib${LIBRARY_PATH:+:$LIBRARY_PATH}" >> $GITHUB_ENV

      - name: Fetch librtlsdr Windows prebuilts
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $url = "https://github.com/rtlsdrblog/rtl-sdr-blog/releases/download/v1.3.6/Release.zip"
          Invoke-WebRequest -Uri $url -OutFile "librtlsdr.zip"
          Expand-Archive -Path "librtlsdr.zip" -DestinationPath "librtlsdr-win"
          New-Item -ItemType Directory -Force -Path vendor/librtlsdr-win-x64 | Out-Null
          foreach ($file in @("rtlsdr.dll", "rtlsdr.lib", "pthreadVC2.dll", "msvcr100.dll")) {
            $src = "librtlsdr-win\x64\$file"
            if (Test-Path $src) { Copy-Item $src -Destination vendor/librtlsdr-win-x64/ -Force }
          }
          Get-ChildItem vendor/librtlsdr-win-x64/
          if (-not (Test-Path "vendor/librtlsdr-win-x64/rtlsdr.lib")) {
            Write-Error "rtlsdr.lib not found in prebuilts — linker will fail"; exit 1
          }
          echo "LIBRTLSDR_LIB_DIR=$env:GITHUB_WORKSPACE\vendor\librtlsdr-win-x64" >> $env:GITHUB_ENV

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
